name: D1 Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: registry/package-lock.json

      - run: npm ci

      - name: Export D1 database
        run: |
          mkdir -p ../backups
          npx wrangler d1 export aaes-registry-db --remote --output=../backups/d1-$(date +%Y%m%d).sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
